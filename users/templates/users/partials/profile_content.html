<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="bg-white p-6 rounded-lg shadow-lg" id="account-details-content">
        <h2 class="text-xl font-semibold text-gray-900 mb-4 tracking-wide">ACCOUNT DETAILS</h2>
        {% include "users/partials/account_details.html" %}
    </div>
</div>

<div class="mt-8">
    <h2 class="text-xl font-semibold text-gray-900 mb-4 tracking-wide">YOU MAY ALSO LIKE</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for product in recommended_products %}
        <div class="bg-white p-4 rounded-lg shadow-lg">
            {% if product.main_image %}
                <img src="{{ product.main_image.url }}"
                     alt="{{ product.name }}"
                     class="w-full h-48 object-cover rounded mb-4">
            {% endif %}
            <h3 class="text-sm font-semibold text-gray-900">{{ product.name }}</h3>
            <p class="text-sm text-gray-700">€{{ product.price }}</p>
            <a href="{% url 'main:product_detail' product.slug %}"
               hx-get="{% url 'main:product_detail' product.slug %}"
               hx-target="#main-content"
               hx-push-url="true"
               class="mt-2 inline-block bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 text-sm">
                CHOOSE OPTIONS
            </a>
        </div>
        {% empty %}
            <p class="text-sm text-gray-700">No recommendations available.</p>
        {% endfor %}
    </div>
</div>
