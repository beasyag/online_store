{% extends "main/base.html" %}

{% block content %}
<div class="min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center tracking-wide">
            HI, {{ request.user.first_name|upper }} {{ request.user.last_name|upper }}
        </h1>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Sidebar -->
            <div class="col-span-1">
                <div class="bg-white p-6 rounded-lg shadow-lg">
                    <ul class="space-y-4">
                        <li>
                            <a href="{% url 'users:profile' %}"
                               hx-get="{% url 'users:profile' %}"
                               hx-target="#profile-content"
                               hx-push-url="true"
                               class="text-gray-700 font-semibold text-sm tracking-wide hover:text-gray-900">
                                ACCOUNT
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'users:order_history' %}"
                               hx-get="{% url 'users:order_history' %}"
                               hx-target="#profile-content"
                               hx-push-url="true"
                               class="text-gray-700 font-semibold text-sm tracking-wide hover:text-gray-900">
                                ORDER HISTORY
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'users:logout' %}"
                               class="text-gray-700 font-semibold text-sm tracking-wide hover:text-gray-900">
                                LOG OUT
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="col-span-3" id="profile-content">
                {% block profile_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
