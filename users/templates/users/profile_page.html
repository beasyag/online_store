{% extends "main/base.html" %}

{% block content %}
<div class="min-h-screen px-4 pt-24 pb-16">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-2xl font-semibold tracking-[0.12em] uppercase mb-8">Account</h1>

        <nav class="flex flex-wrap gap-6 border-b border-gray-200 pb-4 mb-8">
            <a href="{% url 'users:profile' %}"
               hx-get="{% url 'users:profile' %}"
               hx-target="#main-content"
               hx-push-url="true"
               class="text-xs tracking-[0.2em] uppercase {% if request.resolver_match.url_name == 'profile' %}text-black{% else %}text-gray-400 hover:text-black{% endif %}">
                Profile
            </a>
            <a href="{% url 'users:addresses' %}"
               hx-get="{% url 'users:addresses' %}"
               hx-target="#main-content"
               hx-push-url="true"
               class="text-xs tracking-[0.2em] uppercase {% if request.resolver_match.url_name == 'addresses' or request.resolver_match.url_name == 'address_add' or request.resolver_match.url_name == 'address_edit' %}text-black{% else %}text-gray-400 hover:text-black{% endif %}">
                Addresses
            </a>
            <a href="{% url 'users:order_history' %}"
               hx-get="{% url 'users:order_history' %}"
               hx-target="#main-content"
               hx-push-url="true"
               class="text-xs tracking-[0.2em] uppercase {% if request.resolver_match.url_name == 'order_history' or request.resolver_match.url_name == 'order_detail' %}text-black{% else %}text-gray-400 hover:text-black{% endif %}">
                Orders
            </a>
            <a href="{% url 'users:logout' %}"
               class="text-xs tracking-[0.2em] uppercase text-gray-400 hover:text-black">
                Logout
            </a>
        </nav>

        <div id="profile-content">
            {% block profile_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
