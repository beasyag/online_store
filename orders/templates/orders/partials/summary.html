<div class="space-y-3 border-t pt-4">
    <div class="flex justify-between text-sm">
        <span class="text-gray-700">Итого • {{ cart|length }} товар{{ cart|length|pluralize:"а,ов" }}</span>
        <span class="font-medium">€{{ total_price }}</span>
    </div>

    <div class="flex justify-between text-sm">
        <span class="text-gray-700">Доставка</span>
        <span class="text-gray-600">Рассчитывается на следующем шаге</span>
    </div>

    {% if discount > 0 %}
    <div class="flex justify-between text-sm">
        <span class="text-gray-700">Скидка ({{ discount }}%)</span>
        <span class="font-medium">-€{{ total_price|sub:discounted_price }}</span>
    </div>
    {% endif %}

    <div class="flex justify-between text-lg font-medium pt-3 border-t">
        <span>Итого</span>
        <div class="text-right">
            <span class="text-sm text-gray-600">EUR </span>
            <span>€{{ discounted_price }}</span>
        </div>
    </div>
</div>
