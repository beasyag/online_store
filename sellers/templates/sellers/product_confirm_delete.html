{% extends "sellers/base.html" %}

{% block seller_content %}
<div class="max-w-md">
    <p class="text-xs tracking-[0.3em] uppercase text-gray-400 mb-4">Delete Product</p>
    <h1 class="text-2xl font-medium tracking-tight mb-6">{{ product.name }}</h1>
    <p class="text-sm text-gray-500 mb-8">
        Are you sure you want to delete this product? This action cannot be undone and the item will disappear from the shop immediately.
    </p>

    <form method="post" class="flex gap-4">
        {% csrf_token %}
        <button type="submit"
                class="bg-black text-white px-8 py-3 text-xs tracking-[0.2em] uppercase hover:bg-red-600 hover:border-red-600 transition-colors">
            Delete
        </button>
        <a href="{% url 'sellers:products' %}"
           class="border border-gray-300 px-8 py-3 text-xs tracking-[0.2em] uppercase hover:border-gray-900 transition-colors">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
